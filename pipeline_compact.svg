<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #222; }
      .txt { font: 16px Arial, sans-serif; fill: #222; }
      .small { font: 14px Arial, sans-serif; fill: #222; }
      .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; rx: 10; }
      .line { stroke: #333; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="800" y="40" text-anchor="middle" class="title">EEG PLI Analysis Pipeline (Compact)</text>

  <rect x="30" y="110" width="260" height="140" class="box"/>
  <text x="160" y="165" text-anchor="middle" class="txt">Input Excel</text>
  <text x="160" y="190" text-anchor="middle" class="small">PLI data</text>

  <rect x="350" y="110" width="280" height="140" class="box"/>
  <text x="490" y="160" text-anchor="middle" class="txt">Selection + Optional</text>
  <text x="490" y="185" text-anchor="middle" class="txt">Baseline Adjustment</text>

  <rect x="690" y="100" width="330" height="160" class="box"/>
  <text x="855" y="150" text-anchor="middle" class="txt">Iterative Analysis</text>
  <text x="855" y="175" text-anchor="middle" class="small">Network x Frequency</text>
  <text x="855" y="200" text-anchor="middle" class="small">Mixed Model + Contrasts</text>

  <rect x="1080" y="110" width="250" height="140" class="box"/>
  <text x="1205" y="160" text-anchor="middle" class="txt">Visualization</text>
  <text x="1205" y="185" text-anchor="middle" class="small">Per-combo + Combined</text>

  <rect x="1390" y="110" width="190" height="140" class="box"/>
  <text x="1485" y="155" text-anchor="middle" class="txt">Export Results</text>
  <text x="1485" y="180" text-anchor="middle" class="small">Excel + CSV + PNG</text>

  <path d="M290 180 L350 180" class="line"/>
  <path d="M630 180 L690 180" class="line"/>
  <path d="M1020 180 L1080 180" class="line"/>
  <path d="M1330 180 L1390 180" class="line"/>
</svg>
